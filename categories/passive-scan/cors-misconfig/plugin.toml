[plugin]
name = "cors-misconfig"
version = "0.1.0"
author = "kdairatchi"
license = "MIT"
summary = "Flags dangerous CORS: wildcard + credentials, null origin echo, prefix/suffix origin matching."
category = "passive-scan"
events = ["on_response"]
severity_range = ["medium", "high"]
tags = ["cors", "origin", "web"]

[runtime]
engine = "lua"
entry = "main.lua"
min_prowlrview = "0.2.0"
